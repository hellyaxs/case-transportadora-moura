name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: 8.0.x
  NODE_VERSION: 22
  PNPM_VERSION: 10.32.0
  VITE_API_BASE_URL: http://localhost:5086

jobs:
  detect-changes:
    name: Detectar projetos afetados
    runs-on: ubuntu-latest
    outputs:
      affected_projects: ${{ steps.affected.outputs.affected_projects }}
      api_changed: ${{ steps.affected.outputs.api_changed }}
      web_changed: ${{ steps.affected.outputs.web_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect affected projects
        id: affected
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          else
            BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
            HEAD="${{ github.sha }}"
          fi

          projects="$(pnpm nx show projects --affected --base="$BASE" --head="$HEAD" | sed '/^$/d' | sort -u)"
          changed_files="$(git diff --name-only "$BASE" "$HEAD" | sed '/^$/d' | sort -u)"

          echo "Projetos afetados:"
          if [[ -n "$projects" ]]; then
            printf '%s\n' "$projects"
          else
            echo "Nenhum projeto afetado."
          fi

          contains_project() {
            local project="$1"
            printf '%s\n' "$projects" | awk -v expected="$project" '$0 == expected { found = 1 } END { exit found ? 0 : 1 }'
          }

          matches_changed_file() {
            local pattern="$1"
            printf '%s\n' "$changed_files" | awk -v pattern="$pattern" '$0 ~ pattern { found = 1 } END { exit found ? 0 : 1 }'
          }

          api_changed=false
          web_changed=false

          if contains_project "api" \
            || matches_changed_file '^(apps/api/|Directory\.Build\.props$|\.github/workflows/ci-cd\.yml$|\.dockerignore$)'; then
            api_changed=true
          fi

          if contains_project "web" \
            || contains_project "@transportadora-moura/ui" \
            || contains_project "@transportadora-moura/env" \
            || contains_project "@transportadora-moura/config" \
            || contains_project "generated-api-types" \
            || contains_project "api-swagger" \
            || matches_changed_file '^(apps/web/|packages/ui/|packages/env/|packages/config/|packages/generated/api-swagger/|libs/generated/api-types/|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|nx\.json$|tsconfig\.json$|\.github/workflows/ci-cd\.yml$|\.dockerignore$)'; then
            web_changed=true
          fi

          {
            echo "affected_projects<<EOF"
            printf '%s\n' "$projects"
            echo "EOF"
            echo "api_changed=$api_changed"
            echo "web_changed=$web_changed"
          } >> "$GITHUB_OUTPUT"

  api:
    name: Build e testes da API
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore apps/api/__teste__/Api.Test.csproj

      - name: Build
        run: dotnet build apps/api/Api.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test apps/api/__teste__/Api.Test.csproj --configuration Release --no-restore --verbosity normal

  web:
    name: Build e typecheck do Web
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build
        run: pnpm nx run web:build

      - name: Typecheck
        run: pnpm nx run web:check-types

  docker-api:
    name: Docker API
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - api
    if: always() && needs.detect-changes.outputs.api_changed == 'true' && needs.api.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/api" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-web:
    name: Docker Web
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - web
    if: always() && needs.detect-changes.outputs.web_changed == 'true' && needs.web.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/web" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.event_name == 'push' }}
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
