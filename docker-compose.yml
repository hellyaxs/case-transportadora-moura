services:
  postgres:
    image: postgres:16-alpine
    container_name: transportadora-moura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transportadora_moura}
      POSTGRES_USER: ${POSTGRES_USER:-transportadora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transportadora}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: transportadora-moura-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5086
      API_HTTP_PORT: 5086
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-transportadora_moura}
      POSTGRES_USER: ${POSTGRES_USER:-transportadora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transportadora}
      ConnectionStrings__Transportadora: ""
    ports:
      - "${API_HTTP_PORT:-5086}:5086"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: transportadora-moura-web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5086}
    ports:
      - "${WEB_PORT:-3001}:3001"
    depends_on:
      - api

volumes:
  postgres_data:
